#This is a template for module description files
name: des-y6-bao-noDESI
version: '1.0'
category: BAO Likelihoods
purpose: Compute the likelihood for the DES Y6 BAO sample after removing the area overlapping with either the DESI DR1 footprint or the expected DESI DR4 footprint, as specified by the selected flag. This likelihood is intended to be combined with DESI DR1/DR2 BAO or DESI DR3/DR4 BAO measurements, respectively.
url: ''
interface: bao_y6_noDESI_like.py
attribution: [DES Collaboration]
rules: ''
cite:
-   "Mena-Fernández, J. et al., Phys. Rev. D 113, 123521"

assumptions:
-   BAO chi2
-   FLRW metric and standard BAO size

explanation: |
    "This module gives a likelihood of the combination D_M / r_d from the DES Y6 data.
    It interpolates the ratio of that combination to a fiducial value, and then interpolates
    into a pre-computed chi2 as a function of that ratio.
    "
params:
    verbose:
        meaning: Print extra output
        type: bool
        default: false
    chi2_dir:
        meaning: Directory to find data file
        type: str
        default: Module directory
    desi_release:
        meaning: DESI data release used to define footprint overlap removal (dr1/dr2 or dr3/dr4)
        type: str
        default: dr2
    chi2_column:
        meaning: Column to read for alpha from the file
        type: int
        default: 1

inputs:
    distances:
        z:
            meaning: Redshifts of samples
            type: real 1d
            default:
        d_m:
            meaning: Physical angular diameter distance in Mpc
            type: real 1d
            default:
        h:
            meaning: Hubble parameter with in units of Mpc
            type: real 1d
            default:
        rz_zdrag:
            meaning: Sound horizon at last scattering in Mpc
            type: real
            default:
outputs:
    likelihoods:
        des_y6_bao_like:
            meaning: Likelihood of supplied expansion history
            type: real
